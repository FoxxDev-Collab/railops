name: VibeSecOps — Production

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Weekly full scan — catches new CVEs against unchanged code
    - cron: '0 6 * * 1'

concurrency:
  group: vibesecops-production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # SARIF uploads to GitHub Security

# NOTE: env vars moved to job-level — Scorecard publish_results requires
# no global env vars. See https://github.com/ossf/scorecard-action#workflow-restrictions

jobs:

  # ── 1. Workflow YAML audit (zizmor) ──────────────────────────────────────
  zizmor:
    name: Workflow audit (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zizmor
        run: pipx install zizmor

      - name: Run zizmor
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ── 2. Secret scan (gitleaks) ────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. CI — lint, typecheck, tests ───────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm run test --if-present

      - name: Dependency audit
        run: npm audit --audit-level=high --omit=dev

  # ── 4. SAST (CodeQL) ─────────────────────────────────────────────────────
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-typescript

  # ── 5. Filesystem scan (Trivy) ───────────────────────────────────────────
  trivy-fs:
    name: Filesystem scan (Trivy)
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: node_modules,.next

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Trivy filesystem scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'
          skip-dirs: node_modules,.next

  # ── 6. OpenSSF Scorecard — moved to vibesecops-scorecard.yml ─────────────
  # Scorecard requires a workflow with no global write permissions or env vars,
  # so it runs in its own dedicated workflow file.

  # ── 7. Deploy to Vercel (production) — all gates must pass ───────────────
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: [gitleaks, ci, codeql, trivy-fs]
    # Scorecard is informational — does not gate deploy
    if: github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
